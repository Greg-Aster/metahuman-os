<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for better visibility -->
  <circle cx="256" cy="256" r="240" fill="#1a1a2e" stroke="#16213e" stroke-width="4"/>

  <!-- Computer monitor/screen outline -->
  <rect x="100" y="120" width="312" height="220" rx="8" fill="#0f3460" stroke="#16213e" stroke-width="3"/>
  <rect x="110" y="130" width="292" height="190" rx="4" fill="#16213e"/>

  <!-- Monitor stand -->
  <rect x="230" y="340" width="52" height="40" fill="#0f3460"/>
  <rect x="180" y="375" width="152" height="12" rx="6" fill="#0f3460"/>

  <!-- Brain icon inside screen -->
  <g transform="translate(256, 225)">
    <!-- Left hemisphere -->
    <path d="M -50,-40 Q -70,-40 -70,-20 Q -70,0 -60,15 Q -50,25 -40,25 Q -30,25 -25,20 L -25,-10 Q -30,-35 -50,-40 Z"
          fill="#e94560" stroke="#c23d54" stroke-width="2"/>

    <!-- Right hemisphere -->
    <path d="M 50,-40 Q 70,-40 70,-20 Q 70,0 60,15 Q 50,25 40,25 Q 30,25 25,20 L 25,-10 Q 30,-35 50,-40 Z"
          fill="#e94560" stroke="#c23d54" stroke-width="2"/>

    <!-- Corpus callosum (connection) -->
    <ellipse cx="0" cy="-15" rx="25" ry="8" fill="#c23d54"/>

    <!-- Neural pathways (stylized lines) -->
    <path d="M -45,-25 Q -40,-15 -45,-5" stroke="#f56476" stroke-width="2" fill="none"/>
    <path d="M -55,-15 Q -50,-5 -55,5" stroke="#f56476" stroke-width="2" fill="none"/>
    <path d="M -35,-10 Q -30,0 -35,10" stroke="#f56476" stroke-width="2" fill="none"/>

    <path d="M 45,-25 Q 40,-15 45,-5" stroke="#f56476" stroke-width="2" fill="none"/>
    <path d="M 55,-15 Q 50,-5 55,5" stroke="#f56476" stroke-width="2" fill="none"/>
    <path d="M 35,-10 Q 30,0 35,10" stroke="#f56476" stroke-width="2" fill="none"/>

    <!-- Central processing dots -->
    <circle cx="-15" cy="-10" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="15" cy="-10" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="-10" cy="10" r="2.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="10" cy="10" r="2.5" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Circuit board style accent lines at bottom of screen -->
  <g opacity="0.4">
    <line x1="120" y1="310" x2="180" y2="310" stroke="#e94560" stroke-width="2"/>
    <line x1="190" y1="310" x2="250" y2="310" stroke="#e94560" stroke-width="2"/>
    <line x1="260" y1="310" x2="320" y2="310" stroke="#e94560" stroke-width="2"/>
    <line x1="330" y1="310" x2="390" y2="310" stroke="#e94560" stroke-width="2"/>
    <circle cx="185" cy="310" r="3" fill="#e94560"/>
    <circle cx="255" cy="310" r="3" fill="#e94560"/>
    <circle cx="325" cy="310" r="3" fill="#e94560"/>
  </g>

  <!-- Subtle glow effect -->
  <circle cx="256" cy="225" r="80" fill="url(#brainGlow)" opacity="0.2"/>

  <defs>
    <radialGradient id="brainGlow">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>
